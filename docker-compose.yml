services:
  migrate:
    build: .
    command: ["./migrate", "up"]
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-gin_user}
      DB_PASSWORD: ${DB_PASSWORD:-gin_password}
      DB_NAME: ${DB_NAME:-gin_learning}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-gin_user}
      DB_PASSWORD: ${DB_PASSWORD:-gin_password}
      DB_NAME: ${DB_NAME:-gin_learning}
      GIN_MODE: ${GIN_MODE:-release}
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-gin_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gin_password}
      POSTGRES_DB: ${DB_NAME:-gin_learning}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gin_user} -d ${DB_NAME:-gin_learning}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
