run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - goimports
    - revive
    - noctx
    - exhaustruct

  disable:
    - exhaustruct

linters-settings:
  goimports:
    local-prefixes: gin-learning
  revive:
    rules:
      - name: exported
        disabled: true
      - name: unused-parameter
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
